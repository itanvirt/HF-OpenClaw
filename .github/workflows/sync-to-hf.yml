# Syncs this repo to its Hugging Face Space via `git push` using a personal
# access token, exactly as HF's own docs describe for CI/CD to Spaces. This is
# the platform-sanctioned mechanism (no scraping, no rate-limit bypass, no
# workaround of platform restrictions) - it only pushes a repo you own to a
# Space you own. HF_TOKEN is read from an encrypted Actions secret and is
# never written to disk or echoed; GitHub also auto-masks its value in logs.
name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: itanvirtuhin/Hf-OpenClaw
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN repo secret is not set. Add a Hugging Face write token under" >&2
            echo "Settings -> Secrets and variables -> Actions -> New repository secret." >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}" "HEAD:main" --force
